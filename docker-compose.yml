services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mboastay
      POSTGRES_USER: mboastay
      POSTGRES_PASSWORD: mboastay
    volumes:
      - mboa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mboastay"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      POSTGRES_DB: mboastay
      POSTGRES_USER: mboastay
      POSTGRES_PASSWORD: mboastay
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_DEBUG: "1"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    environment:
      VITE_API_PROXY: http://backend:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mboa_pgdata:
